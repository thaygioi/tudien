    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --primary-light: #ccfbf1;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
        }
        
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        
        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 640px; margin: 0 auto; padding: 0 16px; }
        @media (min-width: 768px) { .container { max-width: 720px; padding: 0 24px; } }
        @media (min-width: 1024px) { .container { max-width: 960px; } }

        .alphabet-badge {
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.875rem;
            letter-spacing: 0.02em;
            display: inline-block;
            margin-bottom: 12px;
        }

        .dictionary-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .dictionary-card:hover { box-shadow: var(--shadow-hover); }
        @media (hover: none) { .dictionary-card:active { transform: scale(0.99); } }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9375rem;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: var(--surface); color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary-light); }
        .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg); }
        .btn:active { transform: scale(0.98); }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .dictionary-card { break-inside: avoid; box-shadow: none; border: 1px solid var(--border); }
            .page-break { page-break-before: always; }
            footer { border-top: 1px solid #eee; margin-top: 2rem; }
        }
    </style>
</head>

            </div>
        </div>
        <div class="flex gap-3 w-full">
            <button type="button" onclick="prevCard()" class="btn btn-outline flex-1">← Trước</button>
            <button type="button" onclick="nextCard()" class="btn btn-primary flex-1">Tiếp theo →</button>
        </div>

                            <div class="mt-3 pt-3 border-t border-[var(--border)] flex flex-wrap gap-2 no-print">
                                <button type="button" onclick="playSpeech('${viEsc}', 'vi-VN')" class="min-h-[36px] px-3 rounded-[var(--radius-sm)] text-xs font-semibold bg-[var(--bg)] hover:bg-[var(--border)]">🔊 VN</button>
                                <button type="button" onclick="playSpeech('${cotuEsc}', 'vi-VN')" class="min-h-[36px] px-3 rounded-[var(--radius-sm)] text-xs font-semibold bg-[var(--primary-light)] hover:opacity-90 text-[var(--primary)]">🔊 CT</button>
                                <button type="button" onclick="playSpeech('${enEsc}', 'en-US')" class="min-h-[36px] px-3 rounded-[var(--radius-sm)] text-xs font-semibold bg-[#e0f2fe] hover:opacity-90 text-[#0369a1]">🔊 EN</button>
                            </div>
                        </div>
                    `;
                });
                section.appendChild(grid);
                list.appendChild(section);
            });
        }

        function updateFlashcard() {
            const item = words[currentIndex];
            document.getElementById('fcViet').innerText = item.vi;
            document.getElementById('fcCotu').innerText = item.cotu;
            document.getElementById('fcEng').innerText = item.en;
            document.getElementById('fcCount').innerText = `Từ ${currentIndex + 1} / ${words.length}`;
            const card = document.getElementById('flashcard');
            card.style.opacity = '0';
            setTimeout(() => card.style.opacity = '1', 50);
        }

        function nextCard() { currentIndex = (currentIndex + 1) % words.length; updateFlashcard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + words.length) % words.length; updateFlashcard(); }

        function switchMode(mode) {
            const dicSection = document.getElementById('dictionarySection');
            const flashSection = document.getElementById('flashcardSection');
            const btnDic = document.getElementById('btnDic');
            const btnFlash = document.getElementById('btnFlash');
            if (mode === 'dictionary') {
                dicSection.classList.remove('hidden');
                flashSection.classList.add('hidden');
                btnDic.className = "btn btn-primary";
                btnFlash.className = "btn btn-outline";
            } else {
                dicSection.classList.add('hidden');
                flashSection.classList.remove('hidden');
                btnFlash.className = "btn btn-primary";
                btnDic.className = "btn btn-outline";
                updateFlashcard();
            }
        }

        // TTS: VN và CT = Google TTS (giọng nữ chuẩn tiếng Việt, ổn định trên Vercel). Fallback = trình duyệt giọng nữ.
        const FEMALE_HINT = ['female', 'nữ', 'zira', 'lan', 'samantha', 'susan', 'karen', 'victoria', 'linda', 'hoài', 'mai'];
        const MALE_HINT = ['male', 'nam', 'david', 'mark', 'hữu', 'minh', 'paul', 'daniel', 'james', 'george'];
        let voiceVi = null;
        let voiceEn = null;
        let googleAudioVi = null;

        function isMaleVoice(voice) {
            return MALE_HINT.some(h => (voice.name || '').toLowerCase().includes(h));
        }

        function pickFemaleVoice(list) {
            const notMale = list.filter(v => !isMaleVoice(v));
            const listToUse = notMale.length ? notMale : list;
            return listToUse.find(v => FEMALE_HINT.some(h => (v.name || '').toLowerCase().includes(h))) || listToUse[0];
        }

        function loadVoices() {
            const all = speechSynthesis.getVoices();
            if (all.length === 0) return;
            const viList = all.filter(v => v.lang.startsWith('vi'));
            const enList = all.filter(v => v.lang.startsWith('en'));
            if (viList.length) voiceVi = pickFemaleVoice(viList);
            if (enList.length) voiceEn = pickFemaleVoice(enList);
        }
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();
        setTimeout(loadVoices, 400);
        setTimeout(loadVoices, 1500);

        function playVietnameseWithGoogle(text, onFallback) {
            const q = (text || '').substring(0, 200);
            const url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=' + encodeURIComponent(q);
            if (googleAudioVi) { googleAudioVi.pause(); googleAudioVi.onerror = null; googleAudioVi = null; }
            speechSynthesis.cancel();
            googleAudioVi = new Audio(url);
            googleAudioVi.onerror = function() {
                if (googleAudioVi) { googleAudioVi.onerror = null; googleAudioVi = null; }
                onFallback();
            };
            googleAudioVi.play().catch(function() { onFallback(); });
        }

        function playWithBrowserVi(text) {
            loadVoices();
            speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'vi-VN';
            msg.rate = 0.85;
            msg.pitch = 1;
            if (voiceVi) msg.voice = voiceVi;
            speechSynthesis.speak(msg);
        }

        function playSpeech(text, lang) {
            if (lang.startsWith('vi')) {
                playVietnameseWithGoogle(text, function() { playWithBrowserVi(text); });
                return;
            }
            loadVoices();
            speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang || 'en-US';
            msg.rate = 0.85;
            msg.pitch = 1;
            if (voiceEn) msg.voice = voiceEn;
            speechSynthesis.speak(msg);
        }

        function speak(type) {
            const item = words[currentIndex];
            if (type === 'viet') playSpeech(item.vi, 'vi-VN');      // TTS tiếng Việt
            if (type === 'cotu') playSpeech(item.cotu, 'vi-VN');   // TTS tiếng Cơ Tu (cùng engine vi-VN)
            if (type === 'english') playSpeech(item.en, 'en-US');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = words.filter(i => i.vi.toLowerCase().includes(val) || i.cotu.toLowerCase().includes(val) || i.en.toLowerCase().includes(val));
            renderDictionary(filtered);
        });

        renderDictionary(words);
    </script>
</body>
</html>
